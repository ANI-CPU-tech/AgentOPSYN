version: '3.9'

services:
  db:
    image: postgres:15
    container_name: agentopsyn_db
    restart: always
    environment:
      POSTGRES_DB: agentopsyn_db
      POSTGRES_USER: agentopsyn_user
      POSTGRES_PASSWORD: strongpassword123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: agentopsyn_redis
    ports:
      - "6379:6379"

  web:
    build: ./backend
    container_name: agentopsyn_backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis

  worker:
    build: ./backend
    container_name: agentopsyn_worker
    command: celery -A config worker -l info
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis

volumes:
  postgres_data:

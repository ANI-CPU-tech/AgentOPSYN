version: '3.9'

services:
  db:
    image: ankane/pgvector:latest
    container_name: agentopsyn_db
    restart: always
    environment:
      POSTGRES_DB: agentopsyn_db
      POSTGRES_USER: agentopsyn_user
      POSTGRES_PASSWORD: strongpassword123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: agentopsyn_redis
    ports:
      - "6379:6379"

  web:
    build: ./backend
    container_name: agentopsyn_backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis
    # Allow container to reach Ollama on the host machine
    extra_hosts:
      - "host.docker.internal:host-gateway"

  worker:
    build: ./backend
    container_name: agentopsyn_worker
    # Assuming your project config is in a folder named 'config', otherwise change 'config' to 'backend'
    command: celery -A backend worker -l info
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
    # Allow Celery worker to reach Ollama if it ever needs to
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:

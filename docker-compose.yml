version: '3.9'

services:
  db:
    image: ankane/pgvector:latest
    container_name: agentopsyn_db
    restart: always
    environment:
      POSTGRES_DB: agentopsyn_db
      POSTGRES_USER: agentopsyn_user
      POSTGRES_PASSWORD: strongpassword123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: agentopsyn_redis
    ports:
      - "6379:6379"

  web:
    build: ./backend
    container_name: agentopsyn_backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env 
    depends_on:
      - db
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"

  worker:
    build: ./backend
    container_name: agentopsyn_worker
    # Changed 'config' to 'backend' to match your likely project structure
    command: celery -A backend worker -l info
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env 
    depends_on:
      - db
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:

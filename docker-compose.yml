version: '3.9'

services:
  db:
    image: postgres:15
    container_name: agentopsyn_db
    restart: always
    environment:
      POSTGRES_DB: agentopsyn_db
      POSTGRES_USER: agentopsyn_user
      POSTGRES_PASSWORD: strongpassword123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: ./backend
    container_name: agentopsyn_backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - db

volumes:
  postgres_data:
